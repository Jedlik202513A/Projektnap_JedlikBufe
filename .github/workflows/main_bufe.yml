# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - bufe

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://ghcr.io/mateszadam/
        username: ${{ secrets.AzureAppService_ContainerUsername_4496f7728f6945f2a6aaf9d66cc9eacc }}
        password: ${{ secrets.AzureAppService_ContainerPassword_f44133eb8e5641a786d0fbce0b794e80 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: ghcr.io/mateszadam/${{ secrets.AzureAppService_ContainerUsername_4496f7728f6945f2a6aaf9d66cc9eacc }}/bufe:${{ github.sha }}
        file: ./backend/Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'bufe'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_0726be34f8614d8982278167f82b4211 }}
        images: 'ghcr.io/mateszadam/${{ secrets.AzureAppService_ContainerUsername_4496f7728f6945f2a6aaf9d66cc9eacc }}/bufe:${{ github.sha }}'
